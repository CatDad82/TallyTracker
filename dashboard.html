<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tally — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Spline+Sans+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B2A6B; --red:#E10E17; --cream:#FBF8F2; --white:#FFFFFF;
    --blue:#2F6BFF; --ink:#0B2A6B; --muted:#8A857C; --line:#0B2A6B;
    --stripe:#F4EFE3; --softline:#E6DFD0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{background:var(--cream); color:var(--ink); font-family:'Manrope',sans-serif;
    -webkit-font-smoothing:antialiased; min-height:100vh;}
  ::-webkit-scrollbar{width:12px;height:12px;}
  ::-webkit-scrollbar-track{background:#EFE9DD;}
  ::-webkit-scrollbar-thumb{background:var(--navy);}

  .mast{background:var(--navy); padding:18px 28px; display:flex; align-items:flex-end;
    justify-content:space-between; flex-wrap:wrap; gap:16px;}
  .brand{display:flex; align-items:baseline; gap:12px;}
  .logo{width:22px;height:22px;background:var(--red);display:flex;align-items:center;
    justify-content:center; align-self:center;}
  .logo i{width:9px;height:9px;border-radius:50%;border:2px solid #fff;display:block;}
  .wordmark{font-family:'Archivo',sans-serif; font-weight:900; font-size:30px; line-height:1;
    letter-spacing:-0.02em; color:#fff; text-transform:uppercase;}
  .sub{font-family:'Spline Sans Mono',monospace; font-size:10px; letter-spacing:0.22em;
    text-transform:uppercase; color:#AEBFE0;}
  .controls{display:flex; align-items:center; gap:10px;}
  .controls label{font-family:'Spline Sans Mono',monospace; font-size:10px;
    letter-spacing:0.14em; text-transform:uppercase; color:#AEBFE0;}
  select{font-family:'Spline Sans Mono',monospace; font-size:13px; font-weight:600;
    color:#fff; background:#15234A; border:2px solid #2A3F73; padding:7px 10px;
    border-radius:0; cursor:pointer;}
  .btn{font-family:'Archivo',sans-serif; font-size:12px; font-weight:800;
    text-transform:uppercase; letter-spacing:0.04em; color:#fff; background:var(--red);
    border:none; padding:9px 16px; cursor:pointer;}
  .btn:active{background:#B00C13;}

  .status-strip{background:#15234A; color:#AEBFE0; font-family:'Spline Sans Mono',monospace;
    font-size:11px; letter-spacing:0.06em; padding:7px 28px; display:flex; gap:8px; align-items:center;}
  .dot{width:8px;height:8px;border-radius:50%;background:#3FA45B;}
  .dot.off{background:var(--red);}

  .wrap{padding:26px 28px 60px; max-width:1180px; margin:0 auto;}

  .banner{background:var(--red); color:#fff; padding:22px 26px; display:flex;
    align-items:center; justify-content:space-between; margin-bottom:22px; gap:20px; flex-wrap:wrap;}
  .banner .lead{font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:0.16em;
    text-transform:uppercase; opacity:.9;}
  .banner .title{font-family:'Archivo',sans-serif; font-weight:900; font-size:22px;
    text-transform:uppercase; letter-spacing:0.02em; margin-top:4px;}
  .banner .total{font-family:'Archivo',sans-serif; font-variant-numeric:tabular-nums;
    font-weight:900; font-size:58px; line-height:1; letter-spacing:-0.02em; white-space:nowrap;}

  .grid{display:grid; grid-template-columns:1fr 1fr; gap:22px; margin-bottom:22px;}
  @media(max-width:860px){ .grid{grid-template-columns:1fr;} }

  .card{border:2px solid var(--navy); background:var(--white);}
  .card > h2{margin:0; font-family:'Archivo',sans-serif; font-size:13px; font-weight:900;
    letter-spacing:0.06em; text-transform:uppercase; color:#fff; background:var(--navy); padding:11px 16px;}
  .card .body{padding:14px 16px;}

  .bars{display:flex; flex-direction:column; gap:14px;}
  .bar .top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; gap:12px;}
  .bar .name{font-size:14px; font-weight:700; color:var(--ink); overflow:hidden;
    text-overflow:ellipsis; white-space:nowrap;}
  .bar .val{font-family:'Spline Sans Mono',monospace; font-size:13px; color:var(--ink); white-space:nowrap;}
  .bar .track{height:10px; background:#EFE9DD;}
  .bar .fill{height:10px;}

  table{width:100%; border-collapse:collapse;}
  .tbl thead th{font-family:'Archivo',sans-serif; font-size:11px; font-weight:800;
    letter-spacing:0.06em; text-transform:uppercase; color:#fff; background:var(--navy);
    padding:11px 14px; text-align:left;}
  .tbl tbody td{padding:11px 14px; font-size:13px; color:var(--ink);
    border-bottom:2px solid var(--navy); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .tbl tbody tr:last-child td{border-bottom:none;}
  .tbl tbody tr:nth-child(even){background:var(--stripe);}
  .tbl .num{font-family:'Spline Sans Mono',monospace; text-align:right;}
  .tbl .dur{font-family:'Spline Sans Mono',monospace; font-weight:600; color:var(--red); text-align:right;}
  .tbl .src{font-family:'Spline Sans Mono',monospace; font-size:11px; text-transform:uppercase; color:var(--blue);}
  .tbl td.mut{color:var(--muted);}

  .sec-h{display:flex; align-items:center; gap:12px; margin:26px 0 12px;}
  .sec-h h3{margin:0; font-family:'Archivo',sans-serif; font-size:13px; font-weight:900;
    letter-spacing:0.06em; text-transform:uppercase; color:var(--navy);}
  .sec-h .rule{flex:1; height:2px; background:var(--navy);}

  .empty{padding:34px 16px; text-align:center; color:var(--muted); font-size:14px;}
  .empty b{color:var(--ink);}
  .maxh{max-height:420px; overflow:auto;}
  .pct{color:var(--muted); font-weight:500;}
</style>
</head>
<body>
  <div class="mast">
    <div class="brand">
      <span class="logo"><i></i></span>
      <span class="wordmark">Tally</span>
      <span class="sub">Time&nbsp;Tracker</span>
    </div>
    <div class="controls">
      <label for="days">Window</label>
      <select id="days">
        <option value="1">Today</option>
        <option value="7" selected>Last 7 days</option>
        <option value="14">Last 14 days</option>
        <option value="30">Last 30 days</option>
        <option value="90">Last 90 days</option>
      </select>
      <button class="btn" id="refresh">Refresh</button>
    </div>
  </div>
  <div class="status-strip"><span class="dot" id="statusDot"></span><span id="statusText">Connecting to Tally…</span></div>

  <div class="wrap">
    <div class="banner">
      <div>
        <div class="lead" id="bannerLead">Last 7 days</div>
        <div class="title">Total Tracked</div>
      </div>
      <div class="total" id="totalVal">0h 00m</div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>By Project</h2>
        <div class="body"><div class="bars" id="byProject"></div></div>
      </div>
      <div class="card">
        <h2>By Board</h2>
        <div class="body"><div class="bars" id="byBoard"></div></div>
      </div>
    </div>

    <div class="sec-h"><h3>Top Tasks</h3><div class="rule"></div></div>
    <div class="card">
      <table class="tbl" style="table-layout:fixed">
        <colgroup>
          <col style="width:40%">
          <col style="width:34%">
          <col style="width:10%">
          <col style="width:16%">
        </colgroup>
        <thead><tr><th>Task</th><th>Detail</th><th style="text-align:right">Entries</th><th style="text-align:right">Duration</th></tr></thead>
        <tbody id="byTask"></tbody>
      </table>
    </div>

    <div class="sec-h"><h3>Recent Entries</h3><div class="rule"></div></div>
    <div class="card">
      <div class="maxh">
        <table class="tbl">
          <thead><tr><th>When</th><th>Task</th><th>Project</th><th>Category</th><th style="text-align:right">Duration</th><th>Source</th></tr></thead>
          <tbody id="entries"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
(function(){
  "use strict";
  var $ = function(id){ return document.getElementById(id); };

  function fmtDur(secs){
    secs = Math.max(0, Math.round(secs || 0));
    var h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60), s = secs%60;
    if (h) return h + "h " + String(m).padStart(2,"0") + "m";
    if (m) return m + "m " + String(s).padStart(2,"0") + "s";
    return s + "s";
  }
  function esc(t){
    return String(t == null ? "" : t).replace(/[&<>"]/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];
    });
  }
  function whenLabel(iso){
    if(!iso) return "—";
    var d = new Date(iso);
    if (isNaN(d)) return iso;
    var pad = function(n){ return String(n).padStart(2,"0"); };
    return pad(d.getMonth()+1) + "/" + pad(d.getDate()) + " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
  }
  function sourceLabel(e){
    var ctx = e.url_context || "";
    if (ctx.indexOf("monday.com") !== -1) return "monday";
    return e.app_name || "—";
  }

  var BAR_COLORS = ["#E10E17", "#0B2A6B", "#2F6BFF", "#C77D1B", "#7A8AAE", "#B9B3A7"];

  function renderBars(el, rows, nameKey, total){
    el.innerHTML = "";
    if (!rows || !rows.length){
      el.innerHTML = '<div class="empty">No activity in this window.</div>';
      return;
    }
    rows.slice(0, 8).forEach(function(r, i){
      var secs = r.secs || 0;
      var pct = total > 0 ? (secs/total*100) : 0;
      var name = r[nameKey] || "—";
      var d = document.createElement("div");
      d.className = "bar";
      d.innerHTML =
        '<div class="top"><span class="name">' + esc(name) + '</span>' +
        '<span class="val">' + fmtDur(secs) + ' <span class="pct">· ' + pct.toFixed(0) + '%</span></span></div>' +
        '<div class="track"><div class="fill" style="width:' + Math.max(2, pct).toFixed(1) + '%;background:' +
        BAR_COLORS[i % BAR_COLORS.length] + '"></div></div>';
      el.appendChild(d);
    });
  }

  function renderTasks(rows){
    var tb = $("byTask"); tb.innerHTML = "";
    if (!rows || !rows.length){
      tb.innerHTML = '<tr><td colspan="4" class="empty">No tasks yet.</td></tr>';
      return;
    }
    rows.slice(0, 12).forEach(function(r){
      var detail = r.board_name || r.monday_board_id || "";
      var tr = document.createElement("tr");
      tr.innerHTML =
        '<td style="font-weight:700">' + esc(r.task || "—") + '</td>' +
        '<td class="mut">' + esc(detail) + '</td>' +
        '<td class="num">' + (r.n || 0) + '</td>' +
        '<td class="dur">' + fmtDur(r.secs) + '</td>';
      tb.appendChild(tr);
    });
  }

  function renderEntries(rows){
    var tb = $("entries"); tb.innerHTML = "";
    if (!rows || !rows.length){
      tb.innerHTML = '<tr><td colspan="6" class="empty">No entries in this window.</td></tr>';
      return;
    }
    rows.slice(0, 60).forEach(function(e){
      var tr = document.createElement("tr");
      tr.innerHTML =
        '<td class="mut" style="font-family:\'Spline Sans Mono\',monospace;font-size:12px">' + esc(whenLabel(e.start_time)) + '</td>' +
        '<td style="font-weight:600">' + esc(e.task_name || e.task || "—") + '</td>' +
        '<td>' + esc(e.project || "—") + '</td>' +
        '<td class="mut">' + esc(e.category || "—") + '</td>' +
        '<td class="dur">' + fmtDur(e.duration_seconds) + '</td>' +
        '<td class="src">' + esc(sourceLabel(e)) + '</td>';
      tb.appendChild(tr);
    });
  }

  function setStatus(ok, text){
    $("statusDot").className = "dot" + (ok ? "" : " off");
    $("statusText").textContent = text;
  }

  function bannerLead(days){
    if (String(days) === "1") return "Today";
    return "Last " + days + " days";
  }

  function load(){
    var days = $("days").value;
    $("bannerLead").textContent = bannerLead(days);
    setStatus(true, "Loading…");
    Promise.all([
      fetch("/api/summary?days=" + days).then(function(r){ return r.json(); }),
      fetch("/api/entries?days=" + days).then(function(r){ return r.json(); })
    ]).then(function(res){
      var sum = res[0] || {}, entries = res[1] || [];
      var total = sum.total_seconds || 0;
      $("totalVal").textContent = fmtDur(total);
      renderBars($("byProject"), sum.by_project, "project", total);
      renderBars($("byBoard"), sum.by_board, "board", total);
      renderTasks(sum.by_task);
      renderEntries(entries);
      setStatus(true, "Live · connected to Tally · " + entries.length + " entries");
    }).catch(function(err){
      setStatus(false, "Can't reach Tally. Launch the app, then Refresh.");
      $("totalVal").textContent = "0h 00m";
      ["byProject","byBoard"].forEach(function(id){
        $(id).innerHTML = '<div class="empty"><b>Offline.</b> Start Tally to see live data.</div>';
      });
      $("byTask").innerHTML = '<tr><td colspan="4" class="empty">Start Tally to see live data.</td></tr>';
      $("entries").innerHTML = '<tr><td colspan="6" class="empty">Start Tally to see live data.</td></tr>';
    });
  }

  $("refresh").addEventListener("click", load);
  $("days").addEventListener("change", load);
  load();
  setInterval(load, 30000);
})();
</script>
</body>
</html>
