document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:11px 16px; text-align:right;\">Duration<\u002Fdiv>\n          <div style=\"font-family:'Archivo',sans-serif; font-size:11px; font-weight:800; letter-spacing:0.06em; text-transform:uppercase; color:#fff; padding:11px 16px;\">Detail<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-for list=\"{{ reportRows }}\" as=\"row\" hint-placeholder-count=\"6\">\n          <div style=\"{{ row.rowStyle }}\">\n            <div style=\"font-size:13px; font-weight:700; color:#0B2A6B; padding:11px 16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ row.group }}<\u002Fdiv>\n            <div style=\"font-family:'Spline Sans Mono',monospace; font-size:13px; color:#8a857c; padding:11px 16px; text-align:center;\">{{ row.entries }}<\u002Fdiv>\n            <div style=\"font-family:'Spline Sans Mono',monospace; font-size:13px; font-weight:600; color:#E10E17; padding:11px 16px; text-align:right;\">{{ row.duration }}<\u002Fdiv>\n            <div style=\"font-size:13px; color:#0B2A6B; padding:11px 16px;\">{{ row.detail }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ isAssoc }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:1000px;\">\n      <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:12px;\">\n        <div style=\"max-width:560px;\">\n          <div style=\"font-family:'Archivo',sans-serif; font-weight:900; font-size:18px; text-transform:uppercase; letter-spacing:0.02em; color:#0B2A6B;\">Auto-Assign Rules<\u002Fdiv>\n          <div style=\"font-size:13px; color:#8a857c; margin-top:4px; line-height:1.5;\">When a tracked window matches a source or keyword, Tally files it to the right project and category automatically.<\u002Fdiv>\n        <\u002Fdiv>\n        <span style=\"font-family:'Archivo',sans-serif; font-size:12px; font-weight:800; text-transform:uppercase; color:#fff; background:#E10E17; padding:9px 16px; white-space:nowrap; cursor:pointer;\">+ Add Association<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"border:2px solid #0B2A6B;\">\n        <div style=\"display:grid; grid-template-columns:200px 32px 1fr 1fr 70px; background:#0B2A6B;\">\n          <div style=\"font-family:'Archivo',sans-serif; font-size:11px; font-weight:800; letter-spacing:0.06em; text-transform:uppercase; color:#fff; padding:11px 16px;\">When source matches<\u002Fdiv>\n          <div><\u002Fdiv>\n          <div style=\"font-family:'Archivo',sans-serif; font-size:11px; font-weight:800; letter-spacing:0.06em; text-transform:uppercase; color:#fff; padding:11px 16px;\">Assign project<\u002Fdiv>\n          <div style=\"font-family:'Archivo',sans-serif; font-size:11px; font-weight:800; letter-spacing:0.06em; text-transform:uppercase; color:#fff; padding:11px 16px;\">Assign category<\u002Fdiv>\n          <div style=\"font-family:'Archivo',sans-serif; font-size:11px; font-weight:800; letter-spacing:0.06em; text-transform:uppercase; color:#fff; padding:11px 16px; text-align:center;\">On<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-for list=\"{{ assocRows }}\" as=\"row\" hint-placeholder-count=\"4\">\n          <div style=\"{{ row.rowStyle }}\">\n            <div style=\"padding:13px 16px;\"><span style=\"font-family:'Spline Sans Mono',monospace; font-size:12px; font-weight:600; color:#E10E17; text-transform:uppercase; background:#FBEAEA; padding:4px 9px;\">{{ row.source }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; justify-content:center; color:#b9b3a7;\">→<\u002Fdiv>\n            <div style=\"font-size:13px; font-weight:700; color:#0B2A6B; padding:13px 16px;\">{{ row.project }}<\u002Fdiv>\n            <div style=\"font-size:13px; color:#8a857c; padding:13px 16px;\">{{ row.category }}<\u002Fdiv>\n            <div style=\"display:flex; align-items:center; justify-content:center;\"><div style=\"{{ row.toggleStyle }}\"><div style=\"{{ row.knobStyle }}\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:820}}\">\nclass Component extends DCLogic {\n  state = { tab: 'timer' };\n\n  tabStyle(on) {\n    const base = \"font-family:'Archivo',sans-serif; font-weight:700; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; padding:12px 18px; cursor:pointer; transition:color .12s;\";\n    return base + (on ? \"color:#fff; background:#E10E17;\" : \"color:#9fb2dd; background:transparent;\");\n  }\n\n  logData() {\n    const raw = [\n      ['06/20 19:47','Your Account','General','','43m 10s','chrome'],\n      ['06/20 19:28','Consent Form | Bodi Therapi Wellness','Dezigner Lane','','4m 58s','chrome'],\n      ['06/20 19:25','Forminator Dashboard ‹ Bodi Therapi Wellness','Dezigner Lane','','2m 47s','chrome'],\n      ['06/20 19:08','Edit Form ‹ Bodi Therapi Wellness','Dezigner Lane','','17m 29s','chrome'],\n      ['06/20 19:06','The Hub','Dezigner Lane','','1m 46s','chrome'],\n      ['06/20 18:55','The Hub','Dezigner Lane','','10m 48s','chrome'],\n      ['06/20 18:23','Edit Form ‹ Bodi Therapi Wellness','Dezigner Lane','','31m 49s','chrome'],\n      ['06/20 18:17','Bluemail','Dezigner Lane','','6m 48s','bluemail'],\n      ['06/20 17:27','Claude','Dezigner Lane','','49m 13s','claude'],\n      ['06/20 17:22','Browser','Dezigner Lane','','2m 32s','chrome'],\n      ['06/20 16:55','Claude','General','','4m 41s','claude'],\n      ['06/20 15:40','Claude','No Project','Deep Work','2m 37s',''],\n      ['06/20 15:38','Claude','General','Deep Work','1m 30s','claude'],\n    ];\n    return raw.map((r, i) => ({\n      date: r[0], task: r[1], project: r[2], category: r[3] || '—', duration: r[4], source: r[5] || '—',\n      rowStyle: \"display:grid; grid-template-columns:120px 1fr 160px 130px 100px 110px; align-items:center;\"\n        + (i < raw.length - 1 ? \"border-bottom:2px solid #0B2A6B;\" : \"\")\n        + (i % 2 ? \"background:#F4EFE3;\" : \"background:#fff;\"),\n    }));\n  }\n\n  reportData() {\n    const raw = [\n      ['Claude', 2, '49m 52s', 'Dezigner Lane'],\n      ['Edit Form ‹ Bodi Therapi Wellness', 2, '49m 18s', 'Dezigner Lane'],\n      ['Your Account', 1, '43m 10s', 'General'],\n      ['The Hub', 2, '12m 34s', 'Dezigner Lane'],\n      ['Bluemail', 1, '6m 48s', 'Dezigner Lane'],\n      ['Consent Form | Bodi Therapi Wellness', 1, '4m 58s', 'Dezigner Lane'],\n      ['Time Tracker Dashboard', 1, '4m 32s', 'Dezigner Lane'],\n      ['Forminator Dashboard ‹ Bodi Therapi Wellness', 1, '2m 47s', 'Dezigner Lane'],\n      ['Browser', 1, '2m 32s', 'Dezigner Lane'],\n    ];\n    return raw.map((r, i) => ({\n      group: r[0], entries: r[1], duration: r[2], detail: r[3],\n      rowStyle: \"display:grid; grid-template-columns:1fr 110px 140px 200px; align-items:center;\"\n        + (i < raw.length - 1 ? \"border-bottom:2px solid #0B2A6B;\" : \"\")\n        + (i % 2 ? \"background:#F4EFE3;\" : \"background:#fff;\"),\n    }));\n  }\n\n  assocData() {\n    const raw = [\n      ['claude', 'Dezigner Lane', 'Deep Work', true],\n      ['chrome', 'Dezigner Lane', 'Uncategorized', true],\n      ['bluemail', 'General', 'Admin', true],\n      ['figma', 'Dezigner Lane', 'Design', false],\n    ];\n    return raw.map((r, i) => ({\n      source: r[0], project: r[1], category: r[2],\n      rowStyle: \"display:grid; grid-template-columns:200px 32px 1fr 1fr 70px; align-items:center;\"\n        + (i < raw.length - 1 ? \"border-bottom:2px solid #0B2A6B;\" : \"\")\n        + (i % 2 ? \"background:#F4EFE3;\" : \"background:#fff;\"),\n      toggleStyle: \"width:38px; height:20px; border-radius:0; padding:2px; display:flex; \"\n        + (r[3] ? \"background:#E10E17; justify-content:flex-end;\" : \"background:#cfc8ba; justify-content:flex-start;\"),\n      knobStyle: \"width:16px; height:16px; background:#fff;\",\n    }));\n  }\n\n  renderVals() {\n    const tab = this.state.tab;\n    const go = (t) => () => this.setState({ tab: t });\n    const labels = { timer:'Live · General', log:'Idle', summary:'Idle', reports:'Idle', assoc:'Idle' };\n    return {\n      statusLabel: labels[tab] || 'Idle',\n      isTimer: tab === 'timer',\n      isLog: tab === 'log',\n      isSummary: tab === 'summary',\n      isReports: tab === 'reports',\n      isAssoc: tab === 'assoc',\n      tabTimerStyle: this.tabStyle(tab === 'timer'),\n      tabLogStyle: this.tabStyle(tab === 'log'),\n      tabSummaryStyle: this.tabStyle(tab === 'summary'),\n      tabReportsStyle: this.tabStyle(tab === 'reports'),\n      tabAssocStyle: this.tabStyle(tab === 'assoc'),\n      goTimer: go('timer'),\n      goLog: go('log'),\n      goSummary: go('summary'),\n      goReports: go('reports'),\n      goAssoc: go('assoc'),\n      logRows: this.logData(),\n      reportRows: this.reportData(),\n      assocRows: this.assocData(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
